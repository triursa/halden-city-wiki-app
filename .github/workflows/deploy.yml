name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch vault content (halden-city)
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: |
          curl -sL -H "Authorization: Bearer $GH_TOKEN" \
            -o vault.tar.gz \
            "https://api.github.com/repos/triursa/second-brain-vault/tarball/master"
          mkdir -p vault
          tar xzf vault.tar.gz --strip-components=1 -C vault
          rm vault.tar.gz
          echo "Vault halden-city contents:"
          ls -la vault/domains/worldbuilding/halden-city/

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Set VAULT_DIR
        run: echo "VAULT_DIR=${{ github.workspace }}/vault/domains/worldbuilding/halden-city" >> "$GITHUB_ENV"

      - run: npm run build

      - name: Publish to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: masks-wiki
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}