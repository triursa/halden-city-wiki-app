name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Checkout vault (sparse)
        uses: actions/checkout@v4
        with:
          repository: triursa/second-brain-vault
          token: ${{ secrets.REPO_PAT }}
          path: vault
          sparse-checkout: |
            domains/worldbuilding/halden-city

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VAULT_DIR: ${{ github.workspace }}/vault/domains/worldbuilding/halden-city

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: masks-wiki
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}